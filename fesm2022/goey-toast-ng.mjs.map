<div class="goey-toaster-container">
  <div
    *ngFor="let toast of toasts; trackBy: trackById"
    class="goey-toast-item goey-toast-entering"
    [class.goey-toast-leaving]="toast.dismissing"
    [style.marginBottom.px]="gap"
  >
    <goey-toast
      [title]="toast.title"
      [description]="toast.description"
      [type]="toast.type"
      [phase]="toast.phase"
      [action]="toast.action"
      [icon]="toast.icon"
      [classNames]="toast.classNames"
      [fillColor]="toast.fillColor || defaultFillColor"
      [borderColor]="toast.borderColor || defaultBorderColor"
      [borderWidth]="toast.borderWidth"
      [timing]="toast.timing"
      [duration]="toast.duration"
      [showClose]="toast.showClose !== undefined ? toast.showClose : showClose"
      [spring]="toast.spring !== undefined ? toast.spring : spring"
      [bounce]="toast.bounce !== undefined ? toast.bounce : bounce"
      [toastId]="toast.id"
      [position]="position"
      (dismissed)="onToastDismissed(toast.id)"
      (actionClicked)="onActionClicked(toast)"
    ></goey-toast>
  </div>
</div>
