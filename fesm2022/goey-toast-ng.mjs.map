<div
  class="goey-wrapper"
  #wrapperEl
  [class]="classNames?.wrapper || ''"
  [style.transform]="isRight ? 'scaleX(-1)' : ''"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
  (touchend)="onTouchEnd()"
  (mousedown)="onMouseDown($event)"
>
  <!-- SVG blob background -->
  <svg
    class="goey-blobSvg"
    [attr.width]="svgWidth"
    [attr.height]="svgHeight"
    [style.transform]="isRight ? 'scaleX(-1)' : ''"
  >
    <path
      #blobPath
      [attr.d]="currentPath"
      [attr.fill]="effectiveFillColor"
      [attr.stroke]="effectiveBorderColor"
      [attr.stroke-width]="effectiveBorderWidth"
    />
  </svg>

  <!-- Content on top of SVG -->
  <div
    #contentEl
    class="goey-content"
    [class.goey-contentCompact]="!showBody"
    [class.goey-contentExpanded]="showBody"
    [class]="classNames?.content || ''"
    [style.transform]="isRight ? 'scaleX(-1)' : ''"
  >
    <!-- Header: icon + title -->
    <div class="goey-header" #headerEl [class]="classNames?.header || titleColorClass">
      <div class="goey-iconWrapper" [class]="classNames?.icon || ''">
        <!-- Default icon -->
        <ng-container *ngIf="effectivePhase === 'default'">
          <goey-icon-default [size]="18"></goey-icon-default>
        </ng-container>
        <!-- Success icon -->
        <ng-container *ngIf="effectivePhase === 'success'">
          <goey-icon-success [size]="18"></goey-icon-success>
        </ng-container>
        <!-- Error icon -->
        <ng-container *ngIf="effectivePhase === 'error'">
          <goey-icon-error [size]="18"></goey-icon-error>
        </ng-container>
        <!-- Warning icon -->
        <ng-container *ngIf="effectivePhase === 'warning'">
          <goey-icon-warning [size]="18"></goey-icon-warning>
        </ng-container>
        <!-- Info icon -->
        <ng-container *ngIf="effectivePhase === 'info'">
          <goey-icon-info [size]="18"></goey-icon-info>
        </ng-container>
        <!-- Loading spinner -->
        <ng-container *ngIf="effectivePhase === 'loading'">
          <goey-icon-spinner [size]="18"></goey-icon-spinner>
        </ng-container>
      </div>
      <span class="goey-title">{{ effectiveTitle }}</span>
      <button *ngIf="showClose && !actionSuccess" (click)="onCloseClick($event)" class="goey-close-btn" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Description (visible when expanded) -->
    <div
      *ngIf="showBody && effectiveDescription"
      class="goey-description"
      [class]="classNames?.description || ''"
    >
      {{ effectiveDescription }}
    </div>

    <!-- Action button (visible when expanded) -->
    <div
      *ngIf="showBody && effectiveAction"
      class="goey-actionWrapper"
      [class]="classNames?.actionWrapper || ''"
    >
      <button
        class="goey-actionButton"
        [class]="actionColorClass"
        [class.goey-actionButton]="true"
        (click)="onActionClick()"
      >
        {{ effectiveAction.label }}
      </button>
    </div>
  </div>
</div>
